    <section class="markdown-content"><h3 id="编辑-etc-sysctl-conf"><a href="#编辑-etc-sysctl-conf" class="headerlink" title="编辑 /etc/sysctl.conf"></a>编辑 <code>/etc/sysctl.conf</code></h3><figure class="highlight plaintext"><table><tr><td class="code"><pre><span class="line"># 打开 BBR 拥塞控制算法</span><br><span class="line">net.ipv4.tcp_congestion_control = bbr</span><br><span class="line">net.core.default_qdisc = fq</span><br><span class="line"></span><br><span class="line"># 系统所有进程一共可以打开的文件数量， 每个套接字也占用一个文件描述字</span><br><span class="line">fs.file-max = 1491124</span><br><span class="line"></span><br><span class="line"># 增加 TCP 最大缓冲区大小</span><br><span class="line">net.core.rmem_max = 16777216</span><br><span class="line">net.core.wmem_max = 16777216</span><br><span class="line">net.core.rmem_default = 65536</span><br><span class="line">net.core.wmem_default = 65536</span><br><span class="line">net.core.netdev_max_backlog = 65535</span><br><span class="line">net.core.somaxconn = 65535</span><br><span class="line"></span><br><span class="line"># TCP 内存优化</span><br><span class="line">net.ipv4.tcp_rmem = 4096 87380 16777216</span><br><span class="line">net.ipv4.tcp_wmem = 4096 65536 16777216</span><br><span class="line">net.ipv4.tcp_mem = 5120 10240 20480</span><br><span class="line">net.ipv4.tcp_max_syn_backlog = 65535</span><br><span class="line">net.ipv4.tcp_max_tw_buckets = 55000</span><br><span class="line">net.ipv4.tcp_tw_reuse = 1</span><br><span class="line">net.ipv4.tcp_tw_recycle = 0</span><br><span class="line">net.ipv4.tcp_fin_timeout = 10</span><br><span class="line">net.ipv4.tcp_synack_retries = 2</span><br><span class="line">net.ipv4.tcp_slow_start_after_idle = 0</span><br><span class="line">net.ipv4.tcp_timestamps = 1</span><br><span class="line">net.ipv4.tcp_fastopen=3</span><br><span class="line">net.ipv4.tcp_keepalive_time=7200</span><br><span class="line">net.ipv4.tcp_keepalive_intvl=15</span><br><span class="line">net.ipv4.tcp_keepalive_probes=3</span><br><span class="line">net.ipv4.tcp_mtu_probing = 1</span><br><span class="line">net.ipv4.tcp_syncookies = 1</span><br><span class="line">net.ipv4.ip_forward = 1</span><br></pre></td></tr></table></figure>

<h3 id="修改完成后，执行-sysctl-p-使配置生效"><a href="#修改完成后，执行-sysctl-p-使配置生效" class="headerlink" title="修改完成后，执行 sysctl -p 使配置生效"></a>修改完成后，执行 <code>sysctl -p</code> 使配置生效</h3></section>
